<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>ApexFolio</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#080b10" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ApexFolio" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;--surface:#0f1420;--surface2:#161c2a;--surface3:#1c2438;
  --border:#1e2840;--border2:#26304a;
  --text:#e8eaf2;--text2:#8892aa;--text3:#4a5570;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--amber:#f59e0b;--purple:#a855f7;
  --font:'Syne',sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:6px;--r2:10px;--r3:16px;--r4:24px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh}
button{cursor:pointer;font-family:var(--font)}
input,select{font-family:var(--font)}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(59,130,246,.12) 0%,transparent 60%)}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r4);padding:40px 36px}
.auth-logo{font-size:22px;font-weight:800;letter-spacing:.04em;margin-bottom:32px;text-align:center}
.auth-logo span{color:var(--blue)}
.auth-title{font-size:22px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:14px;padding:11px 14px;border-radius:var(--r2);outline:none}
.form-input:focus{border-color:var(--blue)}
.form-input::placeholder{color:var(--text3)}
.auth-btn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:var(--r2);font-size:14px;font-weight:700;margin-top:8px}
.auth-btn:disabled{opacity:.5}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
.auth-switch a{color:var(--blue);text-decoration:none;font-weight:600}
.auth-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:16px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:16px}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo{font-size:15px;font-weight:800;letter-spacing:.04em;white-space:nowrap}
.logo span{color:var(--blue)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav{display:flex;gap:2px;overflow-x:auto}
.nav-btn{padding:5px 11px;border:none;border-radius:var(--r);background:transparent;color:var(--text2);font-size:12px;font-weight:600;white-space:nowrap}
.nav-btn.active{background:var(--surface2);color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.currency-select{background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:12px;padding:5px 8px;border-radius:var(--r)}
.user-btn{display:flex;align-items:center;gap:7px;padding:5px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r2);font-size:12px;font-weight:600;color:var(--text2)}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.import-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:700;white-space:nowrap}
.addlot-btn{padding:6px 13px;background:var(--surface2);color:var(--text2);border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-weight:700;white-space:nowrap}
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.metrics-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
@media(max-width:900px){.metrics-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.metrics-row{grid-template-columns:repeat(2,1fr)}}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.metric-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;font-weight:700}
.metric-value{font-family:var(--mono);font-size:20px;font-weight:500}
.metric-value.pos{color:var(--green)}.metric-value.neg{color:var(--red)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.metric-sub.pos{color:var(--green)}.metric-sub.neg{color:var(--red)}
.section-header{display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
thead tr{border-bottom:1px solid var(--border2)}
th{padding:9px 12px;text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-weight:700;white-space:nowrap}
th.r{text-align:right}
td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap}
td.r{text-align:right;font-family:var(--mono)}
tr:last-child td{border-bottom:none}
.ticker{font-weight:700;font-size:13px;letter-spacing:.04em}
.co-name{font-size:11px;color:var(--text3)}
.pos{color:var(--green)}.neg{color:var(--red)}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);padding:24px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.modal-close{margin-left:auto;background:none;border:none;color:var(--text3);font-size:18px;padding:2px 6px;border-radius:var(--r)}
.modal-label{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;margin-top:14px}
.modal-input,.modal-select{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:9px 11px;border-radius:var(--r);outline:none}
.modal-input:focus,.modal-select:focus{border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.btn-primary{padding:8px 18px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:700}
.btn-secondary{padding:8px 18px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);border-radius:var(--r);font-size:12px;font-weight:600}
.btn-danger{padding:8px 18px;background:rgba(239,68,68,.15);color:var(--red);border:1px solid var(--red);border-radius:var(--r);font-size:12px;font-weight:600}
.empty-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:48px 24px;text-align:center;margin-top:16px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r2);padding:12px 16px;font-size:12px;z-index:200;max-width:300px}
.toast-title{font-weight:700;font-size:13px;margin-bottom:2px}
.toast.ok .toast-title{color:var(--green)}
.toast.err .toast-title{color:var(--red)}
.toast.warn .toast-title{color:var(--amber)}
.file-drop{border:2px dashed var(--border2);border-radius:var(--r2);padding:24px;text-align:center;cursor:pointer;margin-bottom:12px}
.file-drop:hover{border-color:var(--blue)}
.suggest-box{position:absolute;top:100%;left:0;right:0;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--r);margin-top:2px;z-index:20;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.suggest-item{padding:9px 11px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover{background:var(--surface2)}
.suggest-sym{font-weight:700;font-size:13px;color:var(--text);min-width:60px}
.suggest-name{font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.suggest-ccy{font-size:10px;color:var(--amber);font-family:var(--mono);flex-shrink:0}
.field-rel{position:relative}
.price-hint{display:none;font-size:11px;color:var(--text3);margin-top:6px;font-family:var(--mono)}
.row-btn{padding:3px 8px;border:none;background:none;color:var(--text3);border-radius:var(--r);font-size:12px;cursor:pointer}
.row-btn:hover{background:var(--surface2);color:var(--red)}
.lot-row{background:var(--surface2);border-radius:var(--r);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
.add-row{display:flex;gap:8px;margin-bottom:16px}
.add-input{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:9px 12px;border-radius:var(--r2);outline:none}
.add-btn{padding:9px 16px;background:var(--blue);color:#fff;border:none;border-radius:var(--r2);font-size:12px;font-weight:700;white-space:nowrap}
.group-row{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;margin-bottom:6px}
.group-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.group-name-input{flex:1;background:transparent;border:1px solid transparent;color:var(--text);font-size:13px;font-weight:600;padding:5px 8px;border-radius:var(--r);outline:none}
.group-name-input:focus{border-color:var(--blue);background:var(--surface2)}
</style>
</head>
<body>
<div id="authView">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">APEX<span>FOLIO</span></div>
      <div id="loginForm">
        <div class="auth-title">Welcome back</div>
        <div class="auth-sub">Sign in to your portfolio</div>
        <div id="loginError" class="auth-error" style="display:none"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="loginEmail" type="email" autocomplete="email" /></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="loginPassword" type="password" autocomplete="current-password" /></div>
        <button class="auth-btn" id="loginBtn" onclick="doLogin()">Sign in</button>
        <div class="auth-switch">Don't have an account? <a href="#" onclick="showRegister()">Create one</a></div>
      </div>
      <div id="registerForm" style="display:none">
        <div class="auth-title">Create account</div>
        <div class="auth-sub">Start tracking your portfolio</div>
        <div id="registerError" class="auth-error" style="display:none"></div>
        <div class="form-group"><label class="form-label">Your name</label><input class="form-input" id="regName" type="text" autocomplete="name" /></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="regEmail" type="email" autocomplete="email" /></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="regPassword" type="password" autocomplete="new-password" /></div>
        <button class="auth-btn" id="registerBtn" onclick="doRegister()">Create account</button>
        <div class="auth-switch">Already have an account? <a href="#" onclick="showLogin()">Sign in</a></div>
      </div>
    </div>
  </div>
</div>
<div id="appView" style="display:none" class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">APEX<span>FOLIO</span></div>
      <div class="live-dot"></div>
      <div class="nav">
        <button class="nav-btn active" onclick="setView('portfolio')">Portfolio</button>
        <button class="nav-btn" onclick="setView('ledger')">Ledger</button>
        <button class="nav-btn" onclick="setView('closed')">Closed</button>
        <button class="nav-btn" onclick="setView('groups')">Groups</button>
        <button class="nav-btn" onclick="setView('alerts')">Alerts</button>
        <button class="nav-btn" onclick="setView('watchlist')">Watchlist</button>
        <button class="nav-btn" onclick="setView('cash')">Cash</button>
        <button class="nav-btn" onclick="setView('external')">External</button>
      </div>
    </div>
    <div class="topbar-right">
      <select class="currency-select" id="ccyToggle" onchange="setCurrency(this.value)">
        <option value="AUD" selected>AUD $</option>
        <option value="USD">USD $</option>
      </select>
      <button class="addlot-btn" onclick="openAddLot()">+ Add Lot</button>
      <button class="import-btn" onclick="openImport()">↑ Import</button>
      <button class="user-btn" onclick="doLogout()">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userName">...</span>
      </button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<!-- ADD LOT MODAL -->
<div class="overlay" id="addLotModal" style="display:none">
  <div class="modal">
    <div class="modal-title">+ Add Lot <button class="modal-close" onclick="closeModal('addLotModal')">✕</button></div>
    <div class="field-rel">
      <label class="modal-label">Ticker *</label>
      <input class="modal-input" id="lotTicker" placeholder="e.g. MSFT or MTO.AX" autocomplete="off" oninput="onTickerInput(this)" onblur="onTickerBlur()" />
      <div id="tickerSuggest" class="suggest-box" style="display:none"></div>
    </div>
    <div class="field-rel">
      <label class="modal-label">Company name</label>
      <input class="modal-input" id="lotCompany" placeholder="Type company name to search…" autocomplete="off" oninput="onCompanyInput(this)" onblur="onCompanyBlur()" />
      <div id="companySuggest" class="suggest-box" style="display:none"></div>
    </div>
    <label class="modal-label">Quantity *</label>
    <input class="modal-input" id="lotQty" type="number" step="any" placeholder="50" />
    <label class="modal-label">Avg cost * <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">(auto-fills from date)</span></label>
    <input class="modal-input" id="lotCost" type="number" step="any" placeholder="145.20" oninput="costManuallyEdited=true" />
    <div id="priceHint" class="price-hint"></div>
    <label class="modal-label">Currency</label>
    <select class="modal-select" id="lotCurrency">
      <option value="AUD" selected>AUD</option>
      <option value="USD">USD</option>
      <option value="GBP">GBP</option>
      <option value="EUR">EUR</option>
      <option value="DKK">DKK</option>
      <option value="JPY">JPY</option>
      <option value="HKD">HKD</option>
      <option value="SGD">SGD</option>
    </select>
    <label class="modal-label">Purchase date *</label>
    <input class="modal-input" id="lotDate" type="date" onchange="onDateChange()" />
    <label class="modal-label">Notes</label>
    <input class="modal-input" id="lotNotes" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('addLotModal')">Cancel</button>
      <button class="btn-primary" onclick="saveLot()">Save lot</button>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="overlay" id="importModal" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="modal-title">↑ Import Holdings <button class="modal-close" onclick="closeModal('importModal')">✕</button></div>
    <div class="file-drop" onclick="document.getElementById('netwealthInput').click()">
      <div style="font-size:22px;margin-bottom:6px">🏦</div>
      <div style="font-size:13px;font-weight:700;margin-bottom:3px">Import Netwealth CSV</div>
      <div style="font-size:11px;color:var(--text3)">Cash Transaction Listing - Detail export</div>
    </div>
    <input type="file" id="netwealthInput" accept=".csv" style="display:none" onchange="handleNetwealthFile(this)" />
    <div class="modal-actions"><button class="btn-secondary" onclick="closeModal('importModal')">Cancel</button></div>
  </div>
</div>

<!-- ALERT MODAL -->
<div class="overlay" id="alertModal" style="display:none">
  <div class="modal">
    <div class="modal-title">🔔 Set Alert <button class="modal-close" onclick="closeModal('alertModal')">✕</button></div>
    <label class="modal-label">Ticker</label>
    <input class="modal-input" id="alertTicker" placeholder="AAPL" oninput="this.value=this.value.toUpperCase()" />
    <label class="modal-label">Alert type</label>
    <select class="modal-select" id="alertKind">
      <option value="buy_below">Buy Below</option>
      <option value="trim_above">Trim Above</option>
      <option value="take_profit">Take Profit</option>
      <option value="stop_loss">Stop Loss</option>
      <option value="custom">Custom</option>
    </select>
    <label class="modal-label">Price threshold</label>
    <input class="modal-input" id="alertThreshold" type="number" step="any" placeholder="200.00" />
    <label class="modal-label">Email (for notifications)</label>
    <input class="modal-input" id="alertEmail" type="email" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('alertModal')">Cancel</button>
      <button class="btn-primary" onclick="saveAlert()">Save alert</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" style="display:none">
  <div class="toast-title" id="toastTitle"></div>
  <div id="toastMsg" style="color:var(--text2)"></div>
</div>

<script>
const API='/api';
let TOKEN=localStorage.getItem('apexToken')||null;
let currentUser=JSON.parse(localStorage.getItem('apexUser')||'null');
let currency=localStorage.getItem('apexCurrency')||'AUD';
let viewMode=localStorage.getItem('apexViewMode')||'exposure';
let view='portfolio';
const SYM={USD:'$',AUD:'A$',GBP:'£',EUR:'€',DKK:'kr',JPY:'¥',HKD:'HK$',SGD:'S$'};
let holdings=[],alerts=[],watchlist=[],groups=[],ledger=[],closedPositions=[],cashList=[],externalList=[];
let cashTotalAUD=0, externalTotal=0;
let collapsed=JSON.parse(localStorage.getItem('apexCollapsed')||'{}'); // ticker -> true if collapsed
let liveFx={USD:1.42}; // updated from holdings payload (AUD per 1 USD)

// ── Formatting. Backend sends AUD. In USD mode we divide by live USD→AUD fx. ──
function fxAudPerUsd(){return liveFx.USD||1.42;}
function conv(aud){return currency==='USD' ? (aud/fxAudPerUsd()) : aud;}
function csym(){return currency==='USD'?'US$':'A$';}
function fmt(n){const v=conv(n||0);return(v<0?'-':'')+csym()+Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtPct(n){return(n>=0?'+':'')+(n||0).toFixed(2)+'%';}
// price already in AUD from backend; convert for display
function fmtPrice(n){const v=conv(n||0);return csym()+Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
// native price in its own currency (for pre/post-market lines)
function fmtNative(n,ccy){const s=SYM[ccy]||'$';return s+Math.abs(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

async function apiFetch(path,opts={}){
  const res=await fetch(`${API}${path}`,{...opts,
    headers:{'Content-Type':'application/json',...(TOKEN?{Authorization:`Bearer ${TOKEN}`}:{}),...(opts.headers||{})},
    body:opts.body?JSON.stringify(opts.body):undefined});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error||`HTTP ${res.status}`);
  return data;
}

function showLogin(){document.getElementById('loginForm').style.display='block';document.getElementById('registerForm').style.display='none';}
function showRegister(){document.getElementById('loginForm').style.display='none';document.getElementById('registerForm').style.display='block';}
function setAuthError(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display=msg?'block':'none';}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  setAuthError('loginError','');
  const btn=document.getElementById('loginBtn');btn.disabled=true;btn.textContent='Signing in...';
  try{onAuthSuccess(await apiFetch('/auth/login',{method:'POST',body:{email,password}}));}
  catch(e){setAuthError('loginError',e.message);btn.disabled=false;btn.textContent='Sign in';}
}
async function doRegister(){
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const password=document.getElementById('regPassword').value;
  setAuthError('registerError','');
  const btn=document.getElementById('registerBtn');btn.disabled=true;btn.textContent='Creating account...';
  try{onAuthSuccess(await apiFetch('/auth/register',{method:'POST',body:{name,email,password}}));}

function sortHoldings(list){
  const arr=[...list];
  if(viewMode==='alphabetic') arr.sort((a,b)=>a.ticker.localeCompare(b.ticker));
  else if(viewMode==='exposure') arr.sort((a,b)=>(b.currentValue||0)-(a.currentValue||0));
  return arr;
}

  }
  const metrics=`<div class="metrics-row">

    <span style="font-size:11px;color:var(--text3)">View:</span>
    ${['exposure','alphabetic','group','market'].map(m=>`<button onclick="setViewMode('${m}')" style="font-size:11px;padding:4px 10px;border-radius:var(--r);border:1px solid var(--border2);cursor:pointer;background:${viewMode===m?'var(--surface2)':'transparent'};color:${viewMode===m?'var(--blue)':'var(--text2)'};text-transform:capitalize">${m}</button>`).join('')}

// ─────────────── GROUPS (with two pies) ───────────────
function pieSvg(slices,size){
  // slices: [{label,value,color}]
  const total=slices.reduce((s,x)=>s+x.value,0)||1;
  let ang=-Math.PI/2; const cx=size/2,cy=size/2,r=size/2-2;
  let paths='';
  slices.forEach(sl=>{
    const frac=sl.value/total; const a2=ang+frac*2*Math.PI;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=frac>0.5?1:0;
    if(frac>0.999){paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${sl.color}"/>`;}
    else{paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${sl.color}"/>`;}
    ang=a2;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
}
function legend(slices){
  const total=slices.reduce((s,x)=>s+x.value,0)||1;
  return `<div style="display:flex;flex-direction:column;gap:4px">${slices.map(s=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px"><span style="width:10px;height:10px;border-radius:2px;background:${s.color};display:inline-block"></span><span style="color:var(--text2)">${s.label}</span><span style="margin-left:auto;font-family:var(--mono);color:var(--text3)">${(s.value/total*100).toFixed(1)}%</span></div>`).join('')}</div>`;
}
const PALETTE=['#3b82f6','#22c55e','#f59e0b','#a855f7','#ef4444','#06b6d4','#ec4899','#84cc16','#f97316','#14b8a6','#8b5cf6','#eab308'];
async function loadGroups(){
  const el=document.getElementById('mainContent');
  try{
    const data=await apiFetch('/groups');groups=data.groups||[];
    // actual holdings weight by group
    const byG={};let tot=0;
    holdings.forEach(h=>{const k=h.group_name||'Uncategorized';byG[k]=(byG[k]||0)+(h.currentValue||0);tot+=(h.currentValue||0);});
    const actualSlices=Object.keys(byG).map((k,i)=>({label:k,value:byG[k],color:(groups.find(g=>g.name===k)?.color)||PALETTE[i%PALETTE.length]}));
    // target pie from group target_pct
    const targetSlices=groups.filter(g=>(g.target_pct||0)>0).map((g,i)=>({label:g.name,value:g.target_pct,color:g.color||PALETTE[i%PALETTE.length]}));
    const targetSum=targetSlices.reduce((s,x)=>s+x.value,0);
    if(targetSum<100&&targetSum>0)targetSlices.push({label:'Unallocated',value:100-targetSum,color:'#26304a'});

    const rows=groups.map(g=>`<div class="group-row">
      <div class="group-dot" style="background:${g.color}"></div>
      <input class="group-name-input" value="${g.name}" onchange="renameGroup(${g.id},this.value)" />
      <input type="color" value="${g.color}" onchange="recolorGroup(${g.id},this.value)" style="width:28px;height:28px;border:none;background:none;cursor:pointer;padding:0" />
      <span style="font-size:11px;color:var(--text3)">Target:</span>
      <input type="number" value="${g.target_pct||0}" min="0" max="100" style="width:50px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:4px 6px;border-radius:var(--r);font-size:12px;font-family:var(--mono)" onchange="retargetGroup(${g.id},this.value)" />
      <span style="font-size:11px;color:var(--text3)">%</span>
      <button class="row-btn" onclick="deleteGroup(${g.id})" style="margin-left:auto">✕</button>
    </div>`).join('');

    const pies=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
      <div class="metric-card">
        <div class="metric-label" style="margin-bottom:10px">Target Allocation</div>
        <div style="display:flex;gap:14px;align-items:center">${targetSlices.length?pieSvg(targetSlices,120):'<div style="color:var(--text3);font-size:12px">Set target % below</div>'}${targetSlices.length?legend(targetSlices):''}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label" style="margin-bottom:10px">Actual Holdings</div>
        <div style="display:flex;gap:14px;align-items:center">${actualSlices.length?pieSvg(actualSlices,120):'<div style="color:var(--text3);font-size:12px">No holdings</div>'}${actualSlices.length?legend(actualSlices):''}</div>
      </div>
    </div>`;

    el.innerHTML=`<div class="section-header" style="margin-bottom:14px"><div class="section-title">Portfolio Groups</div></div>
    ${pies}
    <div class="add-row"><input class="add-input" id="newGroupName" placeholder="New group name (e.g. AI Bottlenecks)" onkeypress="if(event.key==='Enter')createGroup()" /><button class="add-btn" onclick="createGroup()">+ Add</button></div>
    <div>${rows||'<div style="color:var(--text3);font-size:13px">No groups yet.</div>'}</div>
    <div style="margin-top:10px;font-size:11px;color:var(--text3)">Left pie = your target %. Right pie = actual weight of holdings in the portfolio.</div>`;
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--red)">${e.message}</div>`;}
}

function renderAlerts(){
  if(!alerts.length) return `<div class="section-header" style="margin-bottom:14px"><div class="section-title">Alerts (0)</div><button class="btn-primary" style="font-size:11px;padding:6px 14px" onclick="openAlert()">+ New Alert</button></div><div class="empty-state"><div style="font-size:13px;color:var(--text3)">No alerts yet.</div></div>`;
  const items=alerts.map(a=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap">
    <strong style="font-size:13px">${a.ticker}</strong>
    <span style="font-size:12px;color:var(--text2)">${a.kind||'alert'} ${a.direction||''} ${fmtPrice(a.threshold)}</span>
    <span style="font-size:11px;font-family:var(--mono);color:${a.status==='active'?'var(--green)':'var(--amber)'}">${a.status}</span>
    <button class="row-btn" style="margin-left:auto" onclick="deleteAlert(${a.id})">✕</button>
  </div>`).join('');
  return `<div class="section-header" style="margin-bottom:14px"><div class="section-title">Alerts (${alerts.length})</div><button class="btn-primary" style="font-size:11px;padding:6px 14px" onclick="openAlert()">+ New Alert</button></div>${items}`;
}
function openAlert(ticker){document.getElementById('alertTicker').value=ticker||'';document.getElementById('alertThreshold').value='';document.getElementById('alertEmail').value=currentUser?.email||'';document.getElementById('alertModal').style.display='flex';}
async function saveAlert(){
  const ticker=document.getElementById('alertTicker').value.toUpperCase().trim();
  const kind=document.getElementById('alertKind').value;
  const threshold=parseFloat(document.getElementById('alertThreshold').value);
  const email=document.getElementById('alertEmail').value;
  if(!ticker||isNaN(threshold)){toast('Missing fields','Fill ticker and threshold','err');return;}
  const direction=['buy_below','stop_loss','review_below'].includes(kind)?'below':'above';
  try{await apiFetch('/alerts',{method:'POST',body:{ticker,kind,direction,threshold,email}});closeModal('alertModal');toast('Alert saved',kind+' '+ticker,'ok');const d=await apiFetch('/alerts');alerts=d.alerts||[];render();}catch(e){toast('Error',e.message,'err');}
}
async function deleteAlert(id){try{await apiFetch('/alerts/'+id,{method:'DELETE'});const d=await apiFetch('/alerts');alerts=d.alerts||[];render();}catch(e){}}

// ─────────────── WATCHLIST ───────────────
function renderWatchlist(){
  return `<div class="section-header" style="margin-bottom:14px"><div class="section-title">Watchlist (${watchlist.length})</div></div>
  <div class="add-row"><input class="add-input" id="watchInput" placeholder="Add ticker (e.g. SNOW or MTO.AX)" onkeypress="if(event.key==='Enter')addWatch()" /><button class="add-btn" onclick="addWatch()">+ Add</button></div>
  ${watchlist.length?watchlist.map(w=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px"><strong>${w.ticker}</strong><span style="font-size:12px;color:var(--text2)">${w.company_name||''}</span><button class="row-btn" style="margin-left:auto" onclick="removeWatch('${w.ticker}')">✕</button></div>`).join(''):'<div class="empty-state"><div style="font-size:13px;color:var(--text3)">Your watchlist is empty.</div></div>'}`;
}
async function addWatch(){const inp=document.getElementById('watchInput');const ticker=(inp.value||'').toUpperCase().trim();if(!ticker)return;try{await apiFetch('/watchlist',{method:'POST',body:{ticker}});inp.value='';toast('Added',ticker,'ok');const d=await apiFetch('/watchlist');watchlist=d.watchlist||[];render();}catch(e){toast('Error',e.message,'err');}}
async function removeWatch(ticker){try{await apiFetch('/watchlist/'+ticker,{method:'DELETE'});const d=await apiFetch('/watchlist');watchlist=d.watchlist||[];render();}catch(e){}}

// ─────────────── CASH ───────────────
function renderCash(){
  const rows=cashList.map(c=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px">
    <strong style="font-size:13px">${c.label||'Cash'}</strong>
    <span style="font-size:12px;color:var(--text2);font-family:var(--mono)">${SYM[c.currency]||''}${(c.amount||0).toLocaleString()} ${c.currency}</span>
    <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">≈ A$${(c.amountAUD||0).toLocaleString(undefined,{maximumFractionDigits:0})}</span>
    <button class="row-btn" style="margin-left:auto" onclick="deleteCash(${c.id})">✕</button>
  </div>`).join('');
  return `<div class="section-header" style="margin-bottom:14px"><div class="section-title">Cash Accounts (${cashList.length})</div><div style="font-family:var(--mono);font-size:13px">Total: ${fmt(cashTotalAUD)}</div></div>
  <div class="add-row" style="flex-wrap:wrap">
    <input class="add-input" id="cashLabel" placeholder="Label (e.g. Netwealth AUD)" style="flex:2" />
    <select class="modal-select" id="cashCcy" style="flex:0 0 90px">${Object.keys(SYM).map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
    <input class="add-input" id="cashAmt" type="number" step="any" placeholder="Amount" style="flex:1" />
    <button class="add-btn" onclick="addCash()">+ Add</button>
  </div>
  ${cashList.length?rows:'<div class="empty-state"><div style="font-size:13px;color:var(--text3)">No cash accounts. Add one above (e.g. AUD in Netwealth, GBP in Wise).</div></div>'}`;
}
async function addCash(){
  const label=document.getElementById('cashLabel').value.trim();
  const currency=document.getElementById('cashCcy').value;
  const amount=parseFloat(document.getElementById('cashAmt').value);
  if(isNaN(amount)){toast('Invalid','Enter an amount','err');return;}
  try{await apiFetch('/cash',{method:'POST',body:{label,currency,amount}});toast('Added',label||'Cash','ok');const d=await apiFetch('/cash');cashList=d.cash||[];cashTotalAUD=d.totalAUD||0;render();}catch(e){toast('Error',e.message,'err');}
}
async function deleteCash(id){if(!confirm('Delete this cash account?'))return;try{await apiFetch('/cash/'+id,{method:'DELETE'});const d=await apiFetch('/cash');cashList=d.cash||[];cashTotalAUD=d.totalAUD||0;render();}catch(e){}}

// ─────────────── EXTERNAL GAINS ───────────────
function renderExternal(){
  const rows=externalList.map(e=>`<tr>
    <td>${e.date_sold||e.date_bought||''}</td>
    <td><div class="ticker">${e.description}</div><div class="co-name">${e.inv_type||''}</div></td>
    <td>${e.broker||''}</td>
    <td style="font-size:10px;color:var(--text3)">${e.date_bought||''} → ${e.date_sold||''}</td>
    <td class="r ${e.direction==='gain'?'pos':'neg'}">${e.direction==='gain'?'+':'-'}${fmt(e.amount)}</td>
    <td class="r"><button class="row-btn" onclick="deleteExternal(${e.id})">✕</button></td>
  </tr>`).join('');
  return `<div class="section-header" style="margin-bottom:14px"><div class="section-title">External Realised P&L (${externalList.length})</div><div style="font-family:var(--mono);font-size:13px" class="${externalTotal>=0?'pos':'neg'}">Total: ${fmt(externalTotal)}</div></div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:12px">Realised gains/losses from other brokers. These add to your overall Realised P&L.</div>
  <div class="add-row" style="flex-wrap:wrap">
    <input class="add-input" id="extDesc" placeholder="Description (e.g. Tesla swing trade)" style="flex:2" />
    <input class="add-input" id="extBroker" placeholder="Broker" style="flex:1" />
    <input class="add-input" id="extType" placeholder="Type (stock, crypto…)" style="flex:1" />
  </div>
  <div class="add-row" style="flex-wrap:wrap">
    <input class="add-input" id="extBought" type="date" style="flex:1" title="Date bought" />
    <input class="add-input" id="extSold" type="date" style="flex:1" title="Date sold" />
    <select class="modal-select" id="extDir" style="flex:0 0 100px"><option value="gain">Gain</option><option value="loss">Loss</option></select>
    <input class="add-input" id="extAmt" type="number" step="any" placeholder="Amount (AUD)" style="flex:1" />
    <button class="add-btn" onclick="addExternal()">+ Add</button>
  </div>
  ${externalList.length?`<div class="table-wrap"><table><thead><tr><th>Date</th><th>Description</th><th>Broker</th><th>Period</th><th class="r">Realised</th><th class="r">Del</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty-state"><div style="font-size:13px;color:var(--text3)">No external entries yet.</div></div>'}`;
}
async function addExternal(){
  const description=document.getElementById('extDesc').value.trim();
  const broker=document.getElementById('extBroker').value.trim();
  const invType=document.getElementById('extType').value.trim();
  const dateBought=document.getElementById('extBought').value;
  const dateSold=document.getElementById('extSold').value;
  const direction=document.getElementById('extDir').value;
  const amount=parseFloat(document.getElementById('extAmt').value);
  if(!description){toast('Missing','Enter a description','err');return;}
  if(isNaN(amount)){toast('Invalid','Enter an amount','err');return;}
  try{await apiFetch('/external',{method:'POST',body:{description,broker,invType,dateBought,dateSold,direction,amount}});toast('Added',description,'ok');const d=await apiFetch('/external');externalList=d.entries||[];externalTotal=d.total||0;render();}catch(e){toast('Error',e.message,'err');}
}
async function deleteExternal(id){if(!confirm('Delete this entry?'))return;try{await apiFetch('/external/'+id,{method:'DELETE'});const d=await apiFetch('/external');externalList=d.entries||[];externalTotal=d.total||0;render();}catch(e){}}

// ─────────────── ADD LOT ───────────────
let tickerCurrency='USD',costManuallyEdited=false;
function openAddLot(){openAddLotFor('','','AUD');}
function openAddLotFor(ticker,company,ccy){
  tickerCurrency=ccy||'AUD';
  document.getElementById('lotTicker').value=ticker||'';
  document.getElementById('lotCompany').value=company||'';
  document.getElementById('lotQty').value='';
  document.getElementById('lotCost').value='';
  document.getElementById('lotDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('lotNotes').value='';
  document.getElementById('lotCurrency').value=tickerCurrency;
  document.getElementById('tickerSuggest').style.display='none';
  document.getElementById('companySuggest').style.display='none';
  document.getElementById('priceHint').style.display='none';
  costManuallyEdited=false;
  document.getElementById('addLotModal').style.display='flex';
}
async function saveLot(){
  const ticker=document.getElementById('lotTicker').value.toUpperCase().trim();
  const company=document.getElementById('lotCompany').value.trim();
  const qty=parseFloat(document.getElementById('lotQty').value);
  const cost=parseFloat(document.getElementById('lotCost').value);
  const lotCurrency=document.getElementById('lotCurrency').value;
  const date=document.getElementById('lotDate').value;
  const notes=document.getElementById('lotNotes').value.trim();
  if(!ticker){toast('Missing ticker','Enter a ticker','err');return;}
  if(isNaN(qty)||qty<=0){toast('Invalid quantity','Enter qty > 0','err');return;}
  if(isNaN(cost)||cost<=0){toast('Invalid cost','Enter cost > 0','err');return;}
  if(!date){toast('Missing date','Select a date','err');return;}
  try{await apiFetch('/transactions',{method:'POST',body:{ticker,companyName:company,type:'buy',quantity:qty,price:cost,currency:lotCurrency,tradeDate:date,notes,source:'manual'}});closeModal('addLotModal');toast('Lot added',qty+' '+ticker,'ok');await loadHoldings();}catch(e){toast('Error',e.message,'err');}
}

let suggestTimer=null;
function debounceSuggest(fn){clearTimeout(suggestTimer);suggestTimer=setTimeout(fn,220);}
async function searchSymbols(q){try{const d=await apiFetch('/lookup/search?q='+encodeURIComponent(q));return d.results||[];}catch(e){return[];}}
function renderSuggest(boxId,results,onPick){
  const box=document.getElementById(boxId);
  if(!results.length){box.style.display='none';return;}
  box.innerHTML=results.map((r,i)=>'<div class="suggest-item" onmousedown="event.preventDefault()" onclick="__pick_'+boxId+'('+i+')"><span class="suggest-sym">'+r.symbol+'</span><span class="suggest-name">'+r.name+'</span><span class="suggest-ccy">'+(r.currency||'USD')+'</span></div>').join('');
  box.style.display='block';
  window['__pick_'+boxId]=(idx)=>{onPick(results[idx]);box.style.display='none';};
}
function onTickerInput(el){el.value=el.value.toUpperCase();const q=el.value.trim();if(q.length<1){document.getElementById('tickerSuggest').style.display='none';return;}debounceSuggest(async()=>{renderSuggest('tickerSuggest',await searchSymbols(q),pickTicker);});}
function pickTicker(r){document.getElementById('lotTicker').value=r.symbol;document.getElementById('lotCompany').value=r.name;tickerCurrency=r.currency||'USD';const sel=document.getElementById('lotCurrency');if([...sel.options].some(o=>o.value===tickerCurrency))sel.value=tickerCurrency;costManuallyEdited=false;fetchHistorical();}
function onTickerBlur(){setTimeout(()=>{document.getElementById('tickerSuggest').style.display='none';},150);const ticker=document.getElementById('lotTicker').value.trim().toUpperCase();const compEl=document.getElementById('lotCompany');if(ticker&&!compEl.value.trim()){apiFetch('/lookup/resolve?ticker='+encodeURIComponent(ticker)).then(d=>{if(d.name)compEl.value=d.name;if(d.currency){tickerCurrency=d.currency;const s=document.getElementById('lotCurrency');if([...s.options].some(o=>o.value===d.currency))s.value=d.currency;}costManuallyEdited=false;fetchHistorical();}).catch(()=>{});}else fetchHistorical();}
function onCompanyInput(el){const q=el.value.trim();if(q.length<2){document.getElementById('companySuggest').style.display='none';return;}debounceSuggest(async()=>{renderSuggest('companySuggest',await searchSymbols(q),pickCompany);});}
function pickCompany(r){document.getElementById('lotTicker').value=r.symbol;document.getElementById('lotCompany').value=r.name;tickerCurrency=r.currency||'USD';const sel=document.getElementById('lotCurrency');if([...sel.options].some(o=>o.value===tickerCurrency))sel.value=tickerCurrency;costManuallyEdited=false;fetchHistorical();}
function onCompanyBlur(){setTimeout(()=>{document.getElementById('companySuggest').style.display='none';},150);}
function onDateChange(){costManuallyEdited=false;fetchHistorical();}

const FX_TO_AUD={USD:1.42,GBP:1.92,AUD:1,EUR:1.64,DKK:0.22,JPY:0.0098,HKD:0.18,SGD:1.11};
const CCY_SYM={USD:'US$',GBP:'£',AUD:'A$',EUR:'€',DKK:'kr',JPY:'¥',HKD:'HK$',SGD:'S$'};
async function fetchHistorical(){
  const ticker=document.getElementById('lotTicker').value.trim().toUpperCase();
  const date=document.getElementById('lotDate').value;
  const hint=document.getElementById('priceHint');const costEl=document.getElementById('lotCost');
  if(!ticker||!date)return;if(costManuallyEdited&&costEl.value)return;
  hint.style.display='block';hint.style.color='var(--text3)';hint.textContent='Fetching '+ticker+' close for '+date+'...';
  try{
    const data=await apiFetch('/lookup/historical?ticker='+encodeURIComponent(ticker)+'&date='+date);
    if(data.close){
      const nativeCcy=data.currency||tickerCurrency||'USD';const nativePrice=data.close;
      const audPrice=nativeCcy==='AUD'?nativePrice:nativePrice*(FX_TO_AUD[nativeCcy]||1.42);
      const sym=CCY_SYM[nativeCcy]||'$';
      costEl.value=nativePrice.toFixed(2);costManuallyEdited=false;
      const sel=document.getElementById('lotCurrency');if([...sel.options].some(o=>o.value===nativeCcy))sel.value=nativeCcy;
      hint.style.color='var(--green)';
      hint.textContent=nativeCcy==='AUD'?'✓ '+data.date+': A$'+nativePrice.toFixed(2):'✓ '+data.date+': '+sym+nativePrice.toFixed(2)+' '+nativeCcy+' · ≈ A$'+audPrice.toFixed(2);
    }else{hint.style.color='var(--text3)';hint.textContent='No price found - enter manually';}
  }catch(e){hint.style.color='var(--text3)';hint.textContent="Couldn't fetch price - enter manually";}
}

function openImport(){document.getElementById('importModal').style.display='flex';}
async function handleNetwealthFile(input){
  const file=input.files[0];if(!file)return;
  toast('Importing','Reading your Netwealth CSV...','ok');
  const formData=new FormData();formData.append('file',file);
  try{const res=await fetch(API+'/import/netwealth',{method:'POST',headers:{Authorization:'Bearer '+TOKEN},body:formData});const data=await res.json();if(!res.ok)throw new Error(data.error||'Import failed');closeModal('importModal');toast('Import complete',data.message,'ok');await loadAll();}catch(e){toast('Import failed',e.message,'err');}
}

function closeModal(id){document.getElementById(id).style.display='none';}
let toastTmr;
function toast(title,msg,type){const el=document.getElementById('toast');document.getElementById('toastTitle').textContent=title;document.getElementById('toastMsg').textContent=msg;el.className='toast '+(type||'ok');el.style.display='block';clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.style.display='none',3800);}
async function tickPrices(){if(!TOKEN||!holdings.length)return;try{const d=await apiFetch('/holdings');holdings=d.holdings||[];const u=holdings.find(h=>h.nativeCurrency==='USD');if(u&&u.fxToAud)liveFx.USD=u.fxToAud;if(view==='portfolio')render();}catch(e){}}
if(TOKEN&&currentUser)enterApp();
setInterval(tickPrices,60000);
document.querySelectorAll('.overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.style.display='none';});});
if('serviceWorker' in navigator){window.addEventListener('load',async()=>{try{await navigator.serviceWorker.register('/sw.js');}catch(err){}});}
</script>
